apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: sentinelone-flux
resources:
  - namespace.yaml
  - helm-repository.yaml
  - helm-release.yaml
configMapGenerator:
  - name: s1-override-conf
    namespace: sentinelone-flux
    files:
      - values.yaml=overrideConf.json
    options:
      disableNameSuffixHash: true
configurations:
  - kustomizeconfig.yaml
